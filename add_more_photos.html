<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Photos</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:15px 0;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

.back{
display:inline-block;
margin-top:15px;
text-decoration:none;
}
</style>

</head>
<body>

<div class="box">

<h2>Add Photos to {{ event_name }}</h2>

<form method="POST" enctype="multipart/form-data">

<form method="POST" enctype="multipart/form-data">

<input type="file" name="photo" required>

<button type="submit">Upload Photo</button>

</form>



<a href="{{ url_for('admin_panel') }}" class="back">
← Back to Admin
</a>

</div>

</body>
</html>
