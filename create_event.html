<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Event</title>
    <style>
        body { font-family: Arial; background:#f2f2f2; padding:20px; }
        form { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
        input[type="text"], textarea, input[type="file"] { width: 100%; margin-bottom: 15px; padding: 8px; }
        button { padding: 10px 20px; background:#4CAF50; border:none; color:white; cursor:pointer; border-radius:6px; }
        button:hover { background:#45a049; }
    </style>
</head>
<body>

<h2>Create New Event</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="text" name="event_name" required>
    <textarea name="description"></textarea>
    <input type="file" name="photo" required>
    <button type="submit">Create Event</button>
</form>

<a href="{{ url_for('admin_panel') }}">← Back to Admin Panel</a>

</body>
</html>
