<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View PDF</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 90%;
            margin: 20px auto;
            text-align: center;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            margin: 5px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .btn-download {
            background: #28a745;
        }

        .btn-download:hover {
            background: #218838;
        }

        .btn-back {
            background: #6c757d;
        }

        .btn-back:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>

<div class="header">
    PDF Viewer
</div>

<div class="container">

    <iframe src="{{ url_for('static', filename='uploads/' + filename) }}"></iframe>

    <div class="buttons">
        <a href="{{ url_for('download_pdf', filename=filename) }}" class="btn btn-download">
            ⬇ Download PDF
        </a>

        <a href="{{ url_for('events') }}" class="btn btn-back">
            ⬅ Back to Events
        </a>
    </div>

</div>

</body>
</html>
