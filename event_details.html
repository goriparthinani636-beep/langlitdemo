<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ event_title }}</title>

<!-- Bootstrap (if not already included) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Page Title */
h2 {
  text-align: center;
  margin: 30px 0;
  font-weight: 600;
}

/* Image Card */
.gallery-card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  transition: 0.4s;
}

/* Hover */
.gallery-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
}

/* Image */
.gallery-img img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.5s;
}

/* Zoom Effect */
.gallery-card:hover img {
  transform: scale(1.1);
}

/* Back Button Container */
.back-container {
  text-align: center;
  margin: 40px 0;
}

/* 🔵 Premium Blue Back Button */
.back-btn {
  display: inline-block;
  min-width: 180px;
  height: 45px;
  line-height: 45px;
  padding: 0 25px;

  background: linear-gradient(45deg, #007bff, #3399ff);
  color: #fff;

  font-size: 15px;
  font-weight: 600;
  text-decoration: none;

  border-radius: 30px;
  box-shadow: 0 6px 15px rgba(0,123,255,0.3);

  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

/* Hover */
.back-btn:hover {
  background: linear-gradient(45deg, #0056b3, #1a8cff);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 12px 25px rgba(0,123,255,0.5);
}

/* Click */
.back-btn:active {
  transform: scale(0.95);
}

/* Shine Effect */
.back-btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.3);
  transform: skewX(-25deg);
  transition: 0.5s;
}

.back-btn:hover::before {
  left: 130%;
}

</style>
</head>

<body>

<h2>{{ event_title }}</h2>

<div class="container">
  <div class="row">

    {% for img in images %}
    <div class="col-xl-4 col-lg-4 col-md-6 mb-4">

      <div class="gallery-card">
        <div class="gallery-img">
          <img src="{{ url_for('static', filename='photos/' + img) }}" alt="Photo {{ loop.index }}">
        </div>
      </div>

    </div>
    {% endfor %}

  </div>
</div>

<div class="back-container">
  <a href="{{ url_for('events') }}" class="back-btn">
    ← Back to Events
  </a>
</div>

</body>
</html>
